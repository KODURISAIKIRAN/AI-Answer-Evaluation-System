<!DOCTYPE html>

<html>


<head>


<title>

My Reports

</title>



<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">



</head>



<body>



<div class="records-container">



<h1>

📄 My Reports

</h1>




{% if reports %}



<table>



<tr>


<th>

Subject

</th>



<th>

Marks

</th>



<th>

Percentage

</th>



<th>

Result

</th>



<th>

Generated On

</th>



</tr>





{% for r in reports %}



<tr>



<td>

{{ r[3] }}

</td>



<td>

{{ r[4] }}/50

</td>



<td>

{{ r[5] }}%

</td>



<td>

{{ r[6] }}

</td>



<td>

{{ r[7] }}

</td>



</tr>



{% endfor %}



</table>



{% else %}



<div class="dash-card">


<h2>

📄

</h2>


<h3>

No Reports Generated

</h3>


<p>

Your reports will appear after evaluation.

</p>


</div>



{% endif %}




<a href="/student_dashboard">

⬅ Back Dashboard

</a>




</div>




</body>



</html>
