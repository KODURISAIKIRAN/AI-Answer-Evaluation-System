<!DOCTYPE html>

<html>


<head>


<title>

Performance Analytics

</title>



<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">



</head>




<body>



<div class="records-container">



<h1>

📈 Performance Analytics

</h1>




<div class="dashboard-grid">



<div class="dash-card">


<h2>📝</h2>


<h3>

Tests Completed

</h3>


<h1>

{{ total }}

</h1>


</div>





<div class="dash-card">


<h2>📊</h2>


<h3>

Average Score

</h3>


<h1>

{{ average }}%

</h1>


</div>





<div class="dash-card">


<h2>🏆</h2>


<h3>

Highest Score

</h3>


<h1>

{{ highest }}%

</h1>


</div>





<div class="dash-card">


<h2>⚠️</h2>


<h3>

Lowest Score

</h3>


<h1>

{{ lowest }}%

</h1>


</div>




</div>





<div class="dash-card"
style="margin-top:30px;">


<h2>

🎯 Performance Status

</h2>


<h3>

{{ status }}

</h3>


</div>





<a href="/student_dashboard">

⬅ Back Dashboard

</a>




</div>



</body>


</html>
