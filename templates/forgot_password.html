<!DOCTYPE html>
<html>

<head>

<title>Forgot Password</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<div class="auth-container">


    <div class="auth-icon">

        🔑

    </div>


    <div class="header">

        <h1>

            Forgot Password

        </h1>


        <p>

            Enter your email to receive OTP

        </p>

    </div>



    {% if error %}

    <div class="error-box">

        ⚠️ {{ error }}

    </div>

    {% endif %}



    {% if success %}

    <div class="success-box">

        {{ success }}

    </div>

    {% endif %}



    <form method="POST">


        <input
        type="email"
        name="email"
        placeholder="Enter Registered Email"
        required>



        <button type="submit">

            📩 Send OTP

        </button>


    </form>



    <div class="auth-link">

        <a href="/login">

            Back to Login

        </a>

    </div>



    <div class="auth-footer">

        AI Assisted Descriptive Answer Evaluation System

    </div>


</div>


</body>


</html>
