<!DOCTYPE html>

<html>


<head>


<title>

Student Settings

</title>



<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">


</head>




<body>



<div class="records-container">



<h1>

⚙ Account Settings

</h1>




{% if message %}

<div class="success-box">

{{ message }}

</div>

{% endif %}




{% if error %}

<div class="error-box">

{{ error }}

</div>

{% endif %}






<form method="POST">



<label>

Name

</label>



<input

type="text"

name="name"

value="{{ name }}"

required

>





<label>

Email

</label>



<input

type="text"

value="{{ email }}"

disabled

>





<label>

Roll Number

</label>



<input

type="text"

value="{{ roll }}"

disabled

>





<label>

Change Password

</label>



<input

type="password"

name="password"

placeholder="Leave empty if no change"

>





<button>

Save Changes

</button>




</form>






<a href="/student_dashboard">

⬅ Back Dashboard

</a>





</div>




</body>



</html>
