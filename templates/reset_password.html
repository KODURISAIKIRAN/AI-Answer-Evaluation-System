<!DOCTYPE html>
<html>

<head>

<title>Reset Password</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<div class="auth-container">


<div class="auth-icon reset-icon">

🔒

</div>


<div class="header">

<h1>

Reset Password

</h1>


<p>

Create your new password

</p>

</div>


{% if error %}

<div class="error-box">

⚠️ {{ error }}

</div>

{% endif %}



<form method="POST">


<div class="password-box">


<input
type="password"
id="resetPassword"
name="password"
placeholder="New Password"
required>


<span onclick="togglePassword('resetPassword', this)">

👁️

</span>


</div>



<button type="submit">

Update Password

</button>


</form>


</div>


<script>

function togglePassword(id, icon){

    let input=document.getElementById(id);


    if(input.type==="password"){

        input.type="text";

        icon.innerHTML="🙈";

    }

    else{

        input.type="password";

        icon.innerHTML="👁️";

    }

}

</script>


</body>

</html>
